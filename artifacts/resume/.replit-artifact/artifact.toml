kind = "web"
previewPath = "/"
title = "Fernando's Resume"
version = "1.0.0"
id = "artifacts/resume"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22792

[services.development]
run = "pnpm --filter @workspace/resume run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/resume", "run", "build" ]
publicDir = "artifacts/resume/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22792"
BASE_PATH = "/"

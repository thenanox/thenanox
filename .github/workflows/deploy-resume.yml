name: Deploy Resume to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate resume files (PDF, DOCX, JSON)
        run: pnpm --filter @workspace/scripts run generate-resume

      - name: Copy static resume files to public folder
        run: |
          cp scripts/output/resume-data.json artifacts/resume/public/resume-data.json
          cp scripts/output/fernando-rodriguez-resume.pdf artifacts/resume/public/fernando-rodriguez-resume.pdf
          cp scripts/output/fernando-rodriguez-resume.docx artifacts/resume/public/fernando-rodriguez-resume.docx

      - name: Build resume app
        run: pnpm --filter @workspace/resume run build
        env:
          BASE_PATH: /
          PORT: 3000
          NODE_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/resume/dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
